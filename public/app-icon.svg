<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f1119"/>
      <stop offset="100%" stop-color="#06070b"/>
    </linearGradient>
    <linearGradient id="chev" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7ee0ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background card -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  <rect x="3" y="3" width="506" height="506" rx="93" fill="none" stroke="#00d4ff" stroke-opacity="0.28" stroke-width="2"/>

  <!-- Status-window corner brackets -->
  <g stroke="#00d4ff" stroke-width="18" fill="none" stroke-linecap="square">
    <path d="M 70 150 V 70 H 150"/>
    <path d="M 362 70 H 442 V 150"/>
    <path d="M 70 362 V 442 H 150"/>
    <path d="M 362 442 H 442 V 362"/>
  </g>

  <!-- Stacked rank-up chevrons (Solo Leveling vibe) -->
  <g fill="url(#chev)" filter="url(#softGlow)">
    <path d="M 256 160 L 364 272 L 314 272 L 256 211 L 198 272 L 148 272 Z"/>
    <path d="M 256 286 L 364 398 L 314 398 L 256 337 L 198 398 L 148 398 Z" opacity="0.55"/>
  </g>
</svg>
